<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTRACKER — Geopolitical Command</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Map viewport -->
  <div id="map-container"></div>

  <!-- Floating country label (follows cursor) -->
  <div id="country-label" class="country-label"></div>

  <!-- Right-side event detail panel -->
  <aside id="event-panel" class="event-panel">
    <button id="panel-close" class="panel-close" aria-label="Close panel">&times;</button>
    <h2 id="panel-country-name" class="panel-country-name"></h2>
    <div id="panel-events" class="panel-events"></div>
  </aside>

  <!-- Header overlay -->
  <header class="hud-header">
    <span class="hud-title">CONTRACKER</span>
    <span class="hud-subtitle">GEOPOLITICAL MONITORING SYSTEM</span>
  </header>

  <!-- D3.js + TopoJSON client — needed for SVG map projection + zoom -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <!-- Application modules (order matters) -->
  <script src="js/events.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
