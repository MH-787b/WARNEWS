<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperAI — Exam Practice Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --violet-400: #a78bfa;
      --violet-500: #8b5cf6;
      --indigo-500: #6366f1;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050508;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #050508 0%, #0a0a1a 25%, #0f0a1f 50%, #0a0a1a 75%, #050508 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 1;
    }
    .orb-1 { width: 600px; height: 600px; background: var(--violet-500); top: -15%; left: -10%; }
    .orb-2 { width: 500px; height: 500px; background: var(--indigo-500); bottom: -15%; right: -10%; }
    .orb-3 { width: 300px; height: 300px; background: var(--violet-400); top: 50%; left: 50%; transform: translate(-50%, -50%); }

    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.35);
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-100vh) translateX(40px); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .main-container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 80px rgba(139, 92, 246, 0.04);
      opacity: 0;
      transform: translateY(40px) scale(0.96);
      animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 640px) {
      .card { padding: 28px 20px; border-radius: 20px; }
      .selects-row { flex-direction: column !important; }
    }

    .header { text-align: center; margin-bottom: 32px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      margin-bottom: 20px;
      animation: badgePulse 3s ease infinite;
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 15px rgba(139, 92, 246, 0.1); }
      50% { box-shadow: 0 0 25px rgba(139, 92, 246, 0.25); }
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--violet-400);
      animation: dotPulse 2s ease infinite;
    }

    @keyframes dotPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.5); opacity: 1; }
    }

    .badge-text {
      color: #c4b5fd;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: clamp(32px, 8vw, 48px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .title-accent {
      background: linear-gradient(135deg, var(--violet-400), var(--indigo-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: rgba(148, 163, 184, 0.7);
      font-size: 14px;
      font-weight: 300;
      margin-top: 12px;
      line-height: 1.6;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }

    .selects-row {
      display: flex;
      gap: 16px;
      margin-bottom: 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .field-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.6);
      transition: color 0.3s ease;
    }

    .select-wrap { position: relative; }

    .select-wrap select {
      width: 100%;
      padding: 14px 40px 14px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .select-wrap select:hover {
      border-color: rgba(139, 92, 246, 0.3);
      background: rgba(255, 255, 255, 0.06);
    }

    .select-wrap select:focus {
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.1), 0 0 40px rgba(139, 92, 246, 0.05);
      background: rgba(255, 255, 255, 0.06);
      transform: scale(1.02);
    }

    .select-wrap select:focus + .select-chevron { color: var(--violet-400); }
    .field:focus-within .field-label { color: var(--violet-400); }

    .select-wrap select option {
      background: #13111C;
      color: #e2e8f0;
      padding: 12px;
    }

    .select-chevron {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: rgba(139, 92, 246, 0.5);
      transition: color 0.3s ease;
    }

    /* ── Results Card ── */
    .results-card {
      animation-delay: 0.4s;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .results-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .results-count {
      font-size: 13px;
      color: rgba(148, 163, 184, 0.5);
      font-weight: 400;
    }

    .papers-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .paper-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateY(12px);
      cursor: default;
    }

    .paper-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(139, 92, 246, 0.2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .paper-item.visible {
      animation: paperSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes paperSlideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .paper-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .paper-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .paper-icon.paper-type {
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.15);
    }

    .paper-icon.ms-type {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.15);
    }

    .paper-icon svg {
      width: 18px;
      height: 18px;
    }

    .paper-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .paper-name {
      font-size: 14px;
      font-weight: 500;
      color: #e2e8f0;
    }

    .paper-meta {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.5);
      font-weight: 400;
    }

    .paper-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .paper-tag {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .tag-paper {
      background: rgba(139, 92, 246, 0.1);
      color: var(--violet-400);
      border: 1px solid rgba(139, 92, 246, 0.15);
    }

    .tag-ms {
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.15);
    }

    .download-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: rgba(148, 163, 184, 0.5);
    }

    .download-btn:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.3);
      color: var(--violet-400);
      transform: scale(1.05);
    }

    .download-btn svg {
      width: 14px;
      height: 14px;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.04);
      margin: 4px 0;
    }

    .year-group {
      margin-bottom: 20px;
    }

    .year-group:last-child {
      margin-bottom: 0;
    }

    .year-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(148, 163, 184, 0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .footer {
      text-align: center;
      margin-top: 0;
      padding: 12px 0;
      color: rgba(71, 85, 105, 0.6);
      font-size: 12px;
      font-weight: 300;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .field:nth-child(1) { opacity: 0; animation: slideUp 0.6s ease 0.4s forwards; }
    .field:nth-child(2) { opacity: 0; animation: slideUp 0.6s ease 0.5s forwards; }
    .field:nth-child(3) { opacity: 0; animation: slideUp 0.6s ease 0.6s forwards; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .paper-right { gap: 6px; }
      .paper-tag { display: none; }
      .paper-item { padding: 14px 16px; }
    }
  </style>
</head>

      { year: 2024, name: "Paper 1 — Physics",                  type: "paper", board: "AQA",             level: "GCSE",     subject: "Physics",          duration: "1h 45m", marks: 100 },
      { year: 2024, name: "Paper 1 Mark Scheme",                type: "ms",    board: "AQA",             level: "GCSE",     subject: "Physics",          duration: null,     marks: null },

      { year: 2024, name: "Paper 1 — Chemistry",                type: "paper", board: "AQA",             level: "GCSE",     subject: "Chemistry",        duration: "1h 45m", marks: 100 },
      { year: 2024, name: "Paper 1 Mark Scheme",                type: "ms",    board: "AQA",             level: "GCSE",     subject: "Chemistry",        duration: null,     marks: null },

      { year: 2024, name: "Paper 1 — GCSE Physics",             type: "paper", board: "Pearson Edexcel", level: "GCSE",     subject: "Physics",          duration: "1h 45m", marks: 100 },
      { year: 2024, name: "Paper 1 Mark Scheme",                type: "ms",    board: "Pearson Edexcel", level: "GCSE",     subject: "Physics",          duration: null,     marks: null },
    ];

    var paperSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>';
    var msSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
    var downloadSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

    function renderPapers(papers) {
      var list = document.getElementById('papersList');
      var count = document.getElementById('resultsCount');
      list.innerHTML = '';

      count.textContent = papers.length + ' resource' + (papers.length !== 1 ? 's' : '');

      var years = {};
      papers.forEach(function(p) {
        if (!years[p.year]) years[p.year] = [];
        years[p.year].push(p);
      });

      var sortedYears = Object.keys(years).sort(function(a, b) { return b - a; });
      var delay = 0;

      sortedYears.forEach(function(year) {
        var group = document.createElement('div');
        group.className = 'year-group';

        var label = document.createElement('div');
        label.className = 'year-label';
        label.textContent = year;
        group.appendChild(label);

        years[year].forEach(function(paper) {
          var item = document.createElement('div');
          item.className = 'paper-item';
          item.style.animationDelay = delay + 'ms';

          var isPaper = paper.type === 'paper';
          var meta = isPaper ? (paper.duration + '  ·  ' + paper.marks + ' marks') : 'Mark Scheme';

          item.innerHTML =
            '<div class="paper-left">' +
              '<div class="paper-icon ' + (isPaper ? 'paper-type' : 'ms-type') + '">' +
                (isPaper ? paperSvg : msSvg) +
              '</div>' +
              '<div class="paper-info">' +
                '<span class="paper-name">' + paper.name + '</span>' +
                '<span class="paper-meta">' + paper.board + '  ·  ' + meta + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="paper-right">' +
              '<span class="paper-tag ' + (isPaper ? 'tag-paper' : 'tag-ms') + '">' + (isPaper ? 'Paper' : 'Mark Scheme') + '</span>' +
              '<button class="download-btn" title="Download">' + downloadSvg + '</button>' +
            '</div>';

          group.appendChild(item);
          delay += 50;
        });

        list.appendChild(group);
      });

      requestAnimationFrame(function() {
        var items = list.querySelectorAll('.paper-item');
        items.forEach(function(item) { item.classList.add('visible'); });
      });
    }

    function filterPapers() {
      var board = document.getElementById('board').value;
      var level = document.getElementById('level').value;
      var subject = document.getElementById('subject').value;

      var filtered = allPapers.filter(function(p) {
        if (board && p.board !== board) return false;
        if (level && p.level !== level) return false;
        if (subject && p.subject !== subject) return false;
        return true;
      });

      renderPapers(filtered);
    }

    renderPapers(allPapers);
  </script>
</body>
</html>
